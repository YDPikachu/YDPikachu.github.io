<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }}</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            background-color: #1a1a1a;
        }
        nav .site-title {
            font-weight: bold;
            color: #fff;
            text-decoration: none;
            font-size: 1.2em;
        }
        nav .nav-links a {
            color: #e0e0e0;
            text-decoration: none;
            margin-left: 20px;
            font-size: 0.95em;
        }
        nav .nav-links a:hover {
            color: #fff;
        }
        main {
            max-width: 800px;
            margin: 50px auto;
            padding: 0 20px;
        }
        /* Gradient text class */
        .gradient-text {
            background: linear-gradient(90deg, #4da8da, #b84dff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 3.5em;
            margin-bottom: 30px;
            font-weight: bold;
        }
        h2 {
            color: #ffffff;
            margin-top: 40px;
        }
        a { 
            color: #82aaff; 
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="site-title">Yan's Site</a>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/projects.html">Projects</a>
        </div>
    </nav>
    <main>
        {{ content }}
    </main>
</body>
</html>
